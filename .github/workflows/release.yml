name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build macOS app bundle
        run: |
          pyinstaller --noconfirm --windowed --name BeAnimal --collect-all cv2 --collect-all numpy beanimal/__main__.py
          ditto -c -k --sequesterRsrc --keepParent dist/BeAnimal.app BeAnimal-macOS.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeAnimal-macOS
          path: BeAnimal-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build Windows executable
        run: |
          pyinstaller --noconfirm --windowed --onefile --name BeAnimal --collect-all cv2 --collect-all numpy beanimal/__main__.py
          powershell -Command "Compress-Archive -Path dist/BeAnimal.exe -DestinationPath BeAnimal-Windows.zip -Force"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeAnimal-Windows
          path: BeAnimal-Windows.zip

  release:
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Inspect downloaded files
        run: |
          find artifacts -maxdepth 2 -type f | sort

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="BeAnimal ${tag}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
          else
            gh release create "$tag" --title "$title" --notes "BeAnimal macOS app bundle and Windows executable."
          fi
          gh release upload "$tag" artifacts/BeAnimal-MacOS/BeAnimal-macOS.zip artifacts/BeAnimal-Windows/BeAnimal-Windows.zip --clobber
